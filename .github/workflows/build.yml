name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java (Required for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.19.0
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 1. تهيئة مشروع أندرويد أولاً لتوليد المجلدات
      - name: Initialize Flet Project
        run: |
          flet build apk --no-pub-get || true

      # 2. نسخ الأيقونة باسمها الجديد (icon.png) إلى المجلدات المنشأة
      - name: Inject Custom Icon & Configs
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          fi

      # 3. إكمال البناء النهائي
      - name: Build APK
        run: |
          flet build apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
