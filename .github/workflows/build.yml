name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java (Required for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet>=0.22.0"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create Flet Configuration
        run: |
          cat << 'EOF' > flet.yaml
          app:
            title: "Alwafa Admin"
            organization: "com.alwafa.admin"
            name: "alwafa_admin"
          icon: "assets/logo.png"
          EOF

      - name: Build APK with Verbose Output
        run: |
          flet build apk -v

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
