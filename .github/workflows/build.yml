name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java (Required for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet>=0.22.0"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Initialize Flet Project Layout
        run: |
          # إنشاء بناء أولي لتوليد مجلدات الأندرويد
          flet build apk --no-pub-get || true

      - name: Inject Custom App Name and Icon
        run: |
          # 1. تغيير اسم التطبيق إلى "Alwafa Admin"
          mkdir -p android/app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Alwafa Admin</string></resources>' > android/app/src/main/res/values/strings.xml

          # 2. استبدال الأيقونة logo.png بجميع مجلدات أبعاد الأندرويد
          if [ -f "assets/logo.png" ]; then
            for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
              mkdir -p "android/app/src/main/res/$dir"
              cp assets/logo.png "android/app/src/main/res/$dir/ic_launcher.png"
            done
            echo "Icon successfully copied!"
          else
            echo "Warning: assets/logo.png not found!"
          fi

      - name: Complete Build APK
        run: |
          flet build apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
